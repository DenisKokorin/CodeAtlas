<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} — Documentation</title>
<style>
  @page {
    margin: 2cm 2.5cm;
    @bottom-center {
      content: counter(page) " / " counter(pages);
      font-size: 10px;
      color: #888;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.7;
    color: #1f2937;
    background: #fff;
    padding: 40px 48px;
    max-width: 960px;
    margin: 0 auto;
  }
  @media print {
    body { padding: 0; }
  }
  h1 { font-size: 28px; margin-bottom: 8px; color: #111827; }
  h2 { font-size: 22px; margin-top: 32px; margin-bottom: 12px; border-bottom: 2px solid #e5e7eb; padding-bottom: 6px; color: #1f2937; }
  h3 { font-size: 18px; margin-top: 24px; margin-bottom: 8px; color: #374151; }
  h4 { font-size: 16px; margin-top: 20px; margin-bottom: 6px; color: #4b5563; }
  p { margin-bottom: 12px; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  ul, ol { margin: 8px 0 12px 24px; }
  li { margin-bottom: 4px; }
  code {
    font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    background: #f3f4f6;
    padding: 2px 6px;
    border-radius: 4px;
    color: #be185d;
  }
  pre {
    background: #1e293b;
    color: #e2e8f0;
    padding: 16px 20px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 12px 0 16px;
    font-size: 13px;
    line-height: 1.5;
  }
  pre code {
    background: none;
    color: inherit;
    padding: 0;
    border-radius: 0;
  }
  blockquote {
    border-left: 4px solid #3b82f6;
    padding: 8px 16px;
    margin: 12px 0;
    background: #f8fafc;
    color: #475569;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0 16px;
  }
  th, td {
    border: 1px solid #d1d5db;
    padding: 8px 12px;
    text-align: left;
  }
  th {
    background: #f9fafb;
    font-weight: 600;
  }
  tr:nth-child(even) { background: #f9fafb; }
  hr { border: none; border-top: 2px solid #e5e7eb; margin: 24px 0; }
  img { max-width: 100%; height: auto; border-radius: 6px; margin: 12px 0; }
  .meta {
    display: flex; flex-wrap: wrap; gap: 16px; margin: 16px 0 24px;
    padding: 16px 20px; background: #f8fafc; border-radius: 8px;
    font-size: 13px; color: #64748b;
  }
  .meta-item { display: flex; align-items: center; gap: 6px; }
  .meta-label { font-weight: 600; color: #475569; }
  .footer {
    margin-top: 40px; padding-top: 16px; border-top: 1px solid #e5e7eb;
    text-align: center; font-size: 12px; color: #9ca3af;
  }
</style>
</head>
<body>
  <h1>{{ title }}</h1>
  {{ meta_html }}
  <hr>
  {{ content }}
  <div class="footer">
    Generated by CodeAtlas &mdash; {{ date }}
  </div>
</body>
</html>
