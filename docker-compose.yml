services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: code-atlas-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: code-atlas-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data: